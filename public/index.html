<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.IO with Tailwind CSS</title>
    <!-- Include the compiled Tailwind CSS file -->
    <link rel="stylesheet" href="/output.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center text-gray-800">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1
            class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-4 text-center">
            Socket.IO Server</h1>

        <p class="text-gray-600 text-center mb-6">Connected to server. See console for messages.</p>

        <div id="messages"
            class="h-48 overflow-y-auto border border-gray-200 rounded-lg p-3 mb-4 bg-gray-50 flex flex-col gap-2">
            <!-- Messages will appear here -->
        </div>

        <form id="message-form" class="flex gap-2">
            <input type="text" id="message-input" placeholder="Type a message..."
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-md hover:shadow-lg">
                Send
            </button>
        </form>
    </div>

    <!-- Include Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts.js"></script>
</body>

</html>
